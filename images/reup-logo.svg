<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#000000" stroke="#e50914" stroke-width="3"/>
  <!-- Up arrow -->
  <polygon points="100,35 145,90 120,90 120,135 80,135 80,90 55,90" fill="url(#arrowGrad)"/>
  <!-- RE UP text -->
  <text x="100" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="4">RE UP</text>
</svg>
