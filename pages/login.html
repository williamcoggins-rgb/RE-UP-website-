<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — RE UP Report</title>
  <meta name="description" content="Sign in to your RE UP Report account.">
  <meta name="theme-color" content="#e50914">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--black-card);
      border: 1px solid var(--gray-800);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo a {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    .auth-logo .logo-accent {
      color: var(--accent);
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.5rem;
    }
    .auth-subtitle {
      color: var(--gray-400);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray-300);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--black);
      border: 1px solid var(--gray-700);
      border-radius: 6px;
      color: var(--white);
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group input::placeholder {
      color: var(--gray-600);
    }
    .btn-auth {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-auth:hover {
      background: var(--accent-hover);
    }
    .btn-auth:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--gray-400);
    }
    .auth-footer a {
      color: var(--accent-text);
      font-weight: 500;
    }
    .auth-errors {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .auth-errors ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .auth-errors li {
      color: var(--red);
      font-size: 0.85rem;
      padding: 0.15rem 0;
    }
    @media (max-width: 500px) {
      .auth-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="../index.html">RE UP <span class="logo-accent">REPORT</span></a>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access your market intelligence.</p>

      <div class="auth-errors" id="login-errors">
        <ul id="error-list"></ul>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="james@yourshop.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Your password">
        </div>

        <button type="submit" class="btn-auth" id="submit-btn">Sign In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </div>

  <script>
  (function () {
    var form = document.getElementById('login-form');
    var errBox = document.getElementById('login-errors');
    var errList = document.getElementById('error-list');
    var submitBtn = document.getElementById('submit-btn');

    function showErrors(errors) {
      errList.innerHTML = '';
      errors.forEach(function (msg) {
        var li = document.createElement('li');
        li.textContent = msg;
        errList.appendChild(li);
      });
      errBox.style.display = 'block';
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      errBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      var payload = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(function (res) { return res.json().then(function (data) { return { status: res.status, data: data }; }); })
      .then(function (result) {
        if (result.data.success) {
          try { localStorage.setItem('reup_token', result.data.token); } catch (e) {}
          window.location.href = 'dashboard.html';
        } else {
          showErrors(result.data.errors || ['Login failed']);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      })
      .catch(function () {
        showErrors(['Network error — please try again']);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      });
    });
  })();
  </script>
</body>
</html>
