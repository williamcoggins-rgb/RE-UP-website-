name = "reupwebsite"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"

[vars]
# DASHBOARD_PASSWORD_HASH must be set as a secret via:
#   npx wrangler secret put DASHBOARD_PASSWORD_HASH
# Value should be the SHA-256 hex hash of your admin password.
# Generate it with: echo -n "yourpassword" | sha256sum
